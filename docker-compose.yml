services:
  astell:
    build:
      context: .
      dockerfile: Dockerfile
    image: astell-library:latest
    restart: unless-stopped
    env_file:
      - .env
    environment:
      ASTELL_LIBRARY_ROOT: /app
      MEMPALACE_SRC: /app/mempalace-develop
      MEMPALACE_DB: /data/mempalace_db
      ASTELL_KNOWLEDGE_LIBRARY: /data/Library
      ASTELL_COMM_BUFFER: /data/COMM_BUFFER
      ASTELL_CONTROL_DB: /data/mempalace_db/astell_control.db
      ASTELL_UI_HOST: 0.0.0.0
      ASTELL_UI_PORT: 8080
      ASTELL_OPEN_BROWSER: 0
      ASTELL_AUTH_ENABLED: ${ASTELL_AUTH_ENABLED:-1}
      ASTELL_AUTH_USER: ${ASTELL_AUTH_USER:-astell}
      ASTELL_AUTH_PASSWORD_SHA256: ${ASTELL_AUTH_PASSWORD_SHA256:?Set ASTELL_AUTH_PASSWORD_SHA256 in .env or run deploy/start_service.sh}
      ASTELL_AUTH_USERS_SHA256: ${ASTELL_AUTH_USERS_SHA256:-}
      ASTELL_AUTH_REALM: ${ASTELL_AUTH_REALM:-Astell Library}
      ASTELL_ADMIN_USERS: ${ASTELL_ADMIN_USERS:-astell}
      ASTELL_EMPLOYEE_USERS: ${ASTELL_EMPLOYEE_USERS:-employee}
      ASTELL_JWT_SECRET: ${ASTELL_JWT_SECRET:?Set ASTELL_JWT_SECRET in .env or run deploy/start_service.sh}
      ASTELL_JWT_EXPIRE_MINUTES: ${ASTELL_JWT_EXPIRE_MINUTES:-720}
      ASTELL_AUTH_BOOTSTRAP_MODE: ${ASTELL_AUTH_BOOTSTRAP_MODE:-seed}
      ASTELL_CORS_ORIGINS: ${ASTELL_CORS_ORIGINS:-http://localhost:8080}
    ports:
      - "${ASTELL_PUBLISHED_PORT:-8080}:8080"
    volumes:
      - astell_mempalace_db:/data/mempalace_db
      - astell_library:/data/Library
      - astell_comm:/data/COMM_BUFFER
      - ./deploy/container/projects:/projects
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1:8080/healthz"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s

volumes:
  astell_mempalace_db:
  astell_library:
  astell_comm:
